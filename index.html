<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugcheck | Entdecken</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── BASIS & VARIABLEN ─── */
:root {
  --bg: #fdfdfd;
  --ink: #1a1815;
  --ink3: #8a857e;
  --rule: #eeeeee;
  --accent: #c0392b;
  --mono: 'DM Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lora', serif;
  overflow-x: hidden;
}

/* ─── MASTHEAD ─── */
.masthead {
  padding: 40px;
  text-align: center;
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  background: rgba(253, 253, 253, 0.9);
  backdrop-filter: blur(10px);
  z-index: 100;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* ─── VITRA GRID ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 2px;
  background: var(--rule); /* Erzeugt feine Linien zwischen den Zellen */
  border-bottom: 1px solid var(--rule);
}

.grid-item {
  background: white;
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  cursor: pointer;
  transition: all 0.3s ease;
  position: relative;
}

.grid-item:hover {
  background: #f9f9f9;
  z-index: 2;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.grid-item img {
  max-width: 80%;
  max-height: 60%;
  object-fit: contain;
  filter: grayscale(100%);
  transition: filter 0.4s, transform 0.4s;
}

.grid-item:hover img {
  filter: grayscale(0%);
  transform: scale(1.05);
}

.grid-item .item-meta {
  position: absolute;
  bottom: 20px;
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--ink3);
  opacity: 0;
  transition: opacity 0.3s;
}

.grid-item:hover .item-meta { opacity: 1; }

/* ─── INFO CARD OVERLAY (DYNAMISCH) ─── */
#infoOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(255, 255, 255, 0.98);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
}

#infoOverlay.active {
  opacity: 1;
  visibility: visible;
}

.close-btn {
  position: absolute;
  top: 40px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 50px;
  border: 1px solid var(--rule);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 20px;
  transition: 0.3s;
}
.close-btn:hover { border-color: var(--ink); background: var(--ink); color: white; }

.modal-content {
  max-width: 900px;
  width: 90%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
}

.modal-img img {
  width: 100%;
  filter: drop-shadow(0 20px 40px rgba(0,0,0,0.1));
}

.modal-info h2 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 10px; }
.modal-info .sub { font-family: var(--mono); font-size: 12px; color: var(--ink3); text-transform: uppercase; margin-bottom: 30px; }

.data-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--rule);
  font-size: 14px;
}

.buy-btn {
  margin-top: 40px;
  display: inline-block;
  padding: 15px 40px;
  border: 1px solid var(--ink);
  text-decoration: none;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 2px;
  transition: 0.3s;
}
.buy-btn:hover { background: var(--ink); color: white; }

/* ─── ANIMATIONEN ─── */
.active .modal-content { animation: fadeInUp 0.8s both; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 768px) {
  .modal-content { grid-template-columns: 1fr; text-align: center; }
  .close-btn { top: 20px; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="logo">Fahrzeug<em>check</em></div>
</header>

<div class="explorer-grid" id="mainGrid">
  </div>

<div id="infoOverlay">
  <div class="close-btn" onclick="closeInfo()">×</div>
  <div class="modal-content" id="modalBody">
    </div>
</div>

<script>
const cars = [
  { id: 1, make: 'BMW', model: '3er M-Sport', img: 'https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=800', consumption: '5.1L', price: 'ab 45.000€' },
  { id: 2, make: 'VW', model: 'Golf GTI', img: 'https://images.unsplash.com/photo-1621348335014-419089758712?auto=format&fit=crop&q=80&w=800', consumption: '7.0L', price: 'ab 38.000€' },
  { id: 3, make: 'Audi', model: 'RS6 Avant', img: 'https://images.unsplash.com/photo-1606152421802-db97b9c7a11b?auto=format&fit=crop&q=80&w=800', consumption: '11.5L', price: 'ab 120.000€' },
  { id: 4, make: 'Porsche', model: '911 Carrera', img: 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=800', consumption: '9.4L', price: 'ab 110.000€' },
  { id: 5, make: 'Mercedes', model: 'G-Klasse', img: 'https://images.unsplash.com/photo-1520031441872-265e4ff70366?auto=format&fit=crop&q=80&w=800', consumption: '12.1L', price: 'ab 140.000€' },
  { id: 6, make: 'Tesla', model: 'Model S', img: 'https://images.unsplash.com/photo-1617788131775-ceb262947465?auto=format&fit=crop&q=80&w=800', consumption: '0.0L', price: 'ab 95.000€' }
];

const grid = document.getElementById('mainGrid');

// Grid erstellen
cars.forEach(car => {
  const item = document.createElement('div');
  item.className = 'grid-item';
  item.onclick = () => openInfo(car);
  item.innerHTML = `
    <img src="${car.img}" alt="${car.model}">
    <div class="item-meta">${car.make} ${car.model}</div>
  `;
  grid.appendChild(item);
});

function openInfo(car) {
  const overlay = document.getElementById('infoOverlay');
  const body = document.getElementById('modalBody');
  
  body.innerHTML = `
    <div class="modal-img">
      <img src="${car.img}" alt="${car.model}">
    </div>
    <div class="modal-info">
      <div class="sub">${car.make}</div>
      <h2>${car.model}</h2>
      <div class="data-row"><span>Verbrauch (WLTP)</span><span>${car.consumption}</span></div>
      <div class="data-row"><span>Marktpreis ca.</span><span>${car.price}</span></div>
      <div class="data-row"><span>Status</span><span>Verfügbar</span></div>
      <a href="#" class="buy-btn">Details ansehen</a>
    </div>
  `;
  
  overlay.classList.add('active');
  document.body.style.overflow = 'hidden'; // Scrollen verhindern
}

function closeInfo() {
  document.getElementById('infoOverlay').classList.remove('active');
  document.body.style.overflow = 'auto';
}
</script>

</body>
</html>
