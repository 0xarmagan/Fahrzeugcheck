<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugcheck | Vitra Style Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdfdfd;
  --ink: #000000;
  --ink2: #4a4640;
  --ink3: #8a857e;
  --rule: #eeeeee;
  --mono: 'DM Mono', monospace;
  --green: #2d6a4f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font-family: 'Lora', serif; overflow-x: hidden; }

/* ─── GRID SİSTEMİ ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 1px;
  background: var(--rule);
}

.grid-item {
  background: white;
  aspect-ratio: 1 / 1.1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 30px;
  transition: all 0.4s ease;
}

.grid-item img {
  max-width: 90%;
  max-height: 50%;
  object-fit: contain;
  filter: grayscale(100%);
  transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.grid-item:hover img { filter: grayscale(0%); transform: scale(1.05); }

.item-label { margin-top: 20px; text-align: center; }
.item-label h3 { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 400; }

/* ─── POP-UP (OVERLAY) ─── */
#modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.92); /* Arka planı görmeyi sağlayan hafif şeffaflık */
  backdrop-filter: blur(5px); /* Vitra tarzı derinlik */
  z-index: 9999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 40px;
}

.modal-content {
  background: white;
  width: 100%;
  max-width: 1100px;
  max-height: 90vh;
  box-shadow: 0 30px 60px rgba(0,0,0,0.1);
  border: 1px solid var(--rule);
  overflow-y: auto;
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  padding: 60px;
  gap: 40px;
}

.close-x {
  position: absolute;
  top: 25px;
  right: 25px;
  cursor: pointer;
  font-size: 30px;
  font-family: var(--mono);
}

/* ─── KART DETAYLARI (GÖRSELDEKİ YAPI) ─── */
.col-left img { width: 100%; margin-bottom: 30px; }
.score-box { border-top: 1px solid var(--rule); padding-top: 20px; }
.score-big { font-family: 'Playfair Display', serif; font-size: 50px; }

.section-title {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--ink3);
  letter-spacing: 2px;
  border-bottom: 1px solid var(--rule);
  margin: 30px 0 15px;
  display: block;
}

.data-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
.data-val { font-family: var(--mono); font-weight: 500; }

.trend-pill {
  display: inline-block;
  padding: 5px 12px;
  border: 1px solid var(--rule);
  font-family: var(--mono);
  font-size: 9px;
  margin: 0 5px 8px 0;
  border-radius: 2px;
}
.trend-hot { border-color: #c0392b; color: #c0392b; }

/* Bar Animasyonları */
.bar-track { height: 2px; background: #eee; margin-top: 5px; }
.bar-fill { height: 100%; background: var(--ink); }

@media (max-width: 900px) { .modal-content { grid-template-columns: 1fr; padding: 30px; } }
</style>
</head>
<body>

<div class="explorer-grid" id="mainGrid"></div>

<div id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="close-x" onclick="closeModal()">×</div>
    <div id="modalBody" style="display: contents;"></div>
  </div>
</div>

<script>
// 40 Aracın Bilgileri
const cars = [];
const brands = ['Mercedes-Benz', 'BMW', 'Audi', 'VW', 'Porsche', 'Tesla', 'Volvo', 'Land Rover'];

for(let i=1; i<=40; i++) {
  const brand = brands[i % brands.length];
  cars.push({
    id: i,
    make: brand,
    name: brand + ' Model ' + (100 + i),
    year: '2023-2025',
    img: `https://images.unsplash.com/photo-1555215695-3004980ad54e?w=600&sig=${i}`, // Temsili görseller
    score: (8 + Math.random()).toFixed(1),
    quote: "Ein Meisterwerk an Effizienz und zeitlosem Design.",
    specs: { service: '25.000 km / 1 J', chain: 'Kette, wartungsfrei', fuel: '4,8 l/100km', battery: '8 Jahre', range: '100km' },
    ratings: { Innenraum: 90 + (i%10), Komfort: 85 + (i%10), Assistenz: 88 }
  });
}

const grid = document.getElementById('mainGrid');
cars.forEach(car => {
  const item = document.createElement('div');
  item.className = 'grid-item';
  item.onclick = () => openModal(car);
  item.innerHTML = `<img src="${car.img}"><div class="item-label"><p style="font-family:var(--mono); font-size:9px; color:var(--ink3)">${car.make}</p><h3>${car.name}</h3></div>`;
  grid.appendChild(item);
});

function openModal(car) {
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="col-left">
      <img src="${car.img}">
      <div class="score-box">
        <div class="score-big">${car.score} <small style="font-size:15px; color:#ccc;">/ 10</small></div>
        <p style="font-family:var(--mono); font-size:10px; color:var(--green)">● SEHR EMPFEHLENSWERT</p>
        <p style="font-style:italic; margin-top:20px; font-size:16px;">„${car.quote}“</p>
      </div>
    </div>
    
    <div class="col-mid">
      <span class="section-title">🔧 Wartung & Reparatur</span>
      <div class="data-row"><span>Service A/B</span><span class="data-val">${car.specs.service}</span></div>
      <div class="data-row"><span>Steuerkette</span><span class="data-val">${car.specs.chain}</span></div>
      <div class="data-row"><span>Garantie</span><span class="data-val">2 Jahre</span></div>
      
      <span class="section-title">⛽ Kraftstoff & Verbrauch</span>
      <div class="data-row"><span>Verbrauch</span><span class="data-val">${car.specs.fuel}</span></div>
      <div class="data-row"><span>PHEV-Batterie</span><span class="data-val">${car.specs.battery}</span></div>
      <div class="data-row"><span>E-Reichweite</span><span class="data-val">${car.specs.range}</span></div>
    </div>
    
    <div class="col-right">
      <span class="section-title">🪑 Komfort & Ausstattung</span>
      ${Object.entries(car.ratings).map(([key, val]) => `
        <div style="margin-bottom:15px">
          <div style="display:flex; justify-content:space-between; font-size:12px"><span>${key}</span><span>${val}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${val}%"></div></div>
        </div>
      `).join('')}
      
      <span class="section-title">📈 Markt & Trend</span>
      <span class="trend-pill trend-hot">🔥 Top-Modell</span>
      <span class="trend-pill">Restwert: Stabil</span>
      <span class="trend-pill">Gefragt</span>
    </div>
  `;
  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}
</script>
</body>
</html>
