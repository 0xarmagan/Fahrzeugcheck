<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugcheck | 40 Modelle Fine-Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --ink: #000000;
  --ink3: #8a857e;
  --mono: 'DM Mono', monospace;
  --green: #2d6a4f;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font-family: 'Lora', serif; overflow-x: hidden; }

/* ─── VITRA GRID (NO BORDERS) ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  padding: 60px 40px;
  gap: 80px 40px;
}
.grid-item {
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.grid-item img {
  max-width: 100%;
  height: auto;
  filter: grayscale(100%) brightness(1.02) contrast(1.1);
  transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
  transform: scale(0.92);
}
.grid-item:hover img {
  filter: grayscale(0%) brightness(1) contrast(1);
  transform: scale(1);
}
.item-label { margin-top: 30px; text-align: center; }
.item-label p { font-family: var(--mono); font-size: 9px; text-transform: uppercase; color: var(--ink3); letter-spacing: 2px; }
.item-label h3 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 400; margin-top: 5px; }

/* ─── POP-UP MODAL ─── */
#modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.94);
  backdrop-filter: blur(12px);
  z-index: 9999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}
.modal-content {
  background: white;
  width: 100%;
  max-width: 1200px;
  max-height: 90vh;
  box-shadow: 0 40px 100px rgba(0,0,0,0.08);
  overflow-y: auto;
  position: relative;
  display: grid;
  grid-template-columns: 1.2fr 0.9fr 0.9fr;
  padding: 80px 60px;
  gap: 60px;
}
.close-btn { position: absolute; top: 30px; right: 40px; cursor: pointer; font-family: var(--mono); font-size: 12px; letter-spacing: 2px; }

/* INFO KART DETAYLARI */
.section-title { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink3); letter-spacing: 2.5px; border-bottom: 1px solid #f0f0f0; margin: 40px 0 20px; padding-bottom: 8px; display: block; }
.data-row { display: flex; justify-content: space-between; font-size: 13.5px; padding: 12px 0; border-bottom: 1px solid #fafafa; }
.data-val { font-family: var(--mono); font-weight: 500; }
.bar-track { height: 1.5px; background: #f0f0f0; margin-top: 10px; }
.bar-fill { height: 100%; background: var(--ink); width: 0; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }
</style>
</head>
<body>

<div class="explorer-grid" id="mainGrid"></div>

<div id="modalOverlay" onclick="closeModal()">

function closeModal() {
