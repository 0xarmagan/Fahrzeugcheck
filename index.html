<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugcheck | Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── BASIS & VITRA AESTHETICS ─── */
:root {
  --bg: #fdfdfd;
  --bg-alt: #f7f7f7;
  --ink: #1a1815;
  --ink2: #4a4640;
  --ink3: #8a857e;
  --rule: #eeeeee;
  --accent: #c0392b;
  --green: #2d6a4f;
  --amber: #b8730a;
  --mono: 'DM Mono', monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Lora', serif;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.masthead {
  padding: 30px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--rule);
  position: sticky;
  top: 0;
  background: rgba(253, 253, 253, 0.9);
  backdrop-filter: blur(10px);
  z-index: 100;
}

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.5px;
}
.logo em { font-style: italic; font-weight: 400; color: var(--ink3); }

/* ─── EXPLORER GRID ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
  background: var(--rule);
  border-bottom: 1px solid var(--rule);
}

.grid-item {
  background: white;
  aspect-ratio: 1 / 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
  cursor: pointer;
  transition: background 0.4s ease;
  position: relative;
}

.grid-item:hover { background: var(--bg-alt); }

.grid-item img {
  max-width: 90%;
  max-height: 55%;
  object-fit: contain;
  /* Vitra-esque grayscale to color transition */
  filter: grayscale(100%) brightness(1.05);
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.grid-item:hover img {
  filter: grayscale(0%) brightness(1);
  transform: scale(1.08) translateY(-10px);
}

.item-info {
  position: absolute;
  bottom: 30px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.grid-item:hover .item-info { opacity: 1; }

.item-info h3 { font-family: 'Playfair Display', serif; font-size: 18px; margin-bottom: 4px; }
.item-info p { font-family: var(--mono); font-size: 10px; color: var(--ink3); text-transform: uppercase; letter-spacing: 1px; }

/* ─── MODAL OVERLAY ─── */
#infoOverlay {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 1000;
  display: none; /* JS ile açılacak */
  overflow-y: auto;
}

.close-panel {
  position: fixed;
  top: 40px;
  right: 40px;
  width: 44px;
  height: 44px;
  border: 1px solid var(--rule);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 1100;
  font-size: 24px;
  transition: 0.2s;
}
.close-panel:hover { background: var(--ink); color: white; border-color: var(--ink); }

.modal-inner {
  max-width: 1100px;
  margin: 100px auto;
  padding: 0 40px 100px;
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 80px;
}

.modal-visual img {
  width: 100%;
  position: sticky;
  top: 150px;
  filter: drop-shadow(0 30px 60px rgba(0,0,0,0.12));
}

.modal-content h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 10px; line-height: 1.1; }
.modal-content .subhead { font-family: var(--mono); font-size: 12px; color: var(--ink3); text-transform: uppercase; margin-bottom: 40px; }

.section-label {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  color: var(--ink3);
  letter-spacing: 2px;
  margin: 30px 0 15px;
  display: block;
  border-bottom: 1px solid var(--rule);
  padding-bottom: 8px;
}

.info-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid #f9f9f9;
  font-size: 14px;
}

.info-row .val { font-family: var(--mono); font-weight: 500; }
.info-row .val.good { color: var(--green); }
.info-row .val.warn { color: var(--amber); }

/* Bars */
.bar-wrap { margin-bottom: 15px; }
.bar-label { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
.bar-track { height: 2px; background: #eee; }
.bar-fill { height: 100%; background: var(--ink); transition: width 1s ease; }

/* Verdict Box */
.verdict-card {
  background: var(--bg-alt);
  padding: 30px;
  margin-top: 40px;
  border-radius: 4px;
}
.v-score { font-family: 'Playfair Display', serif; font-size: 56px; margin-bottom: 10px; }
.v-quote { font-style: italic; font-size: 18px; line-height: 1.5; color: var(--ink2); }

/* Animation */
.active-modal { animation: slideIn 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 900px) {
  .modal-inner { grid-template-columns: 1fr; }
  .modal-visual img { position: static; }
}
</style>
</head>
<body>

<header class="masthead">
  <div class="logo">Fahrzeug<em>check</em></div>
  <div style="font-family: var(--mono); font-size: 10px; color: var(--ink3);">MARKTÜBERSICHT 2024</div>
</header>

<div class="explorer-grid" id="carGrid">
  </div>

<div id="infoOverlay">
  <div class="close-panel" onclick="closeInfo()">×</div>
  <div id="modalTarget"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────
const carDatabase = [
  {
    id: 'bmw-320d',
    make: 'BMW',
    model: '3er 320d Touring',
    year: '2019 – 2024',
    img: 'https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&q=80&w=1000',
    specs: [
      { l: 'Verbrauch', v: '5,1 l/100km', c: 'good' },
      { l: 'Wartung', v: 'Kette (Wartungsfrei)', c: 'good' },
      { l: 'Reichweite', v: '~820 km', c: '' },
      { l: 'Besonderheit', v: 'xDrive Automatik', c: '' }
    ],
    scores: [
      { n: 'Fahrdynamik', v: 92 },
      { n: 'Effizienz', v: 88 },
      { n: 'Restwert', v: 85 }
    ],
    verdict: { s: '8.4', q: 'Der Goldstandard für Vielfahrer. Sparsam, dynamisch und extrem wertstabil.' }
  },
  {
    id: 'golf-gti',
    make: 'Volkswagen',
    model: 'Golf 8 GTI',
    year: '2021 – 2024',
    img: 'https://images.unsplash.com/photo-1621348335014-419089758712?auto=format&fit=crop&q=80&w=1000',
    specs: [
      { l: 'Verbrauch', v: '7,4 l/100km', c: 'warn' },
      { l: 'Getriebe', v: 'DSG (60k Intervall)', c: '' },
      { l: 'Leistung', v: '245 PS', c: 'good' },
      { l: 'Infotainment', v: 'Software-Anfällig', c: 'warn' }
    ],
    scores: [
      { n: 'Fahrspaß', v: 95 },
      { n: 'Alltag', v: 82 },
      { n: 'Software', v: 65 }
    ],
    verdict: { s: '8.1', q: 'Die Sport-Ikone. Perfekt für den Alltag, solange man mit der Touch-Bedienung klarkommt.' }
  },
  {
    id: 'c-klasse',
    make: 'Mercedes-Benz',
    model: 'C-Klasse C220d',
    year: '2022 – 2025',
    img: 'https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?auto=format&fit=crop&q=80&w=1000',
    specs: [
      { l: 'Verbrauch', v: '4,8 l/100km', c: 'good' },
      { l: 'Interieur', v: 'MBUX Hyper', c: 'good' },
      { l: 'Reichweite', v: '~1.000 km', c: 'good' },
      { l: 'Komfort', v: 'Luftfederung opt.', c: '' }
    ],
    scores: [
      { n: 'Luxus', v: 94 },
      { n: 'Komfort', v: 91 },
      { n: 'Preis/Leistung', v: 78 }
    ],
    verdict: { s: '8.7', q: 'Eine kleine S-Klasse. Der W206 ist aktuell das Maß der Dinge im Innenraum-Design.' }
  },
  {
    id: 'audi-a4',
    make: 'Audi',
    model: 'A4 35 TDI',
    year: '2019 – 2024',
    img: 'https://images.unsplash.com/photo-1606152421802-db97b9c7a11b?auto=format&fit=crop&q=80&w=1000',
    specs: [
      { l: 'Verbrauch', v: '5,3 l/100km', c: 'good' },
      { l: 'Verarbeitung', v: 'Exzellent', c: 'good' },
      { l: 'Ölverbrauch', v: 'Beobachten', c: 'warn' },
      { l: 'Technik', v: 'Virtual Cockpit', c: '' }
    ],
    scores: [
      { n: 'Verarbeitung', v: 96 },
      { n: 'Bedienung', v: 90 },
      { n: 'Design', v: 80 }
    ],
    verdict: { s: '7.9', q: 'Solide wie eine Burg. Der A4 ist für Leute, die Qualität vor Show stellen.' }
  },
  {
    id: 'porsche-911',
    make: 'Porsche',
    model: '911 Carrera (992)',
    year: '2020 – 2024',
    img: 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&q=80&w=1000',
    specs: [
      { l: 'Verbrauch', v: '10,5 l/100km', c: 'warn' },
      { l: 'Wartung', v: 'Hohe Fixkosten', c: 'warn' },
      { l: 'Werterhalt', v: 'Legendär', c: 'good' },
      { l: 'Performance', v: '385 PS', c: 'good' }
    ],
    scores: [
      { n: 'Prestige', v: 98 },
      { n: 'Handling', v: 99 },
      { n: 'Alltag', v: 70 }
    ],
    verdict: { s: '9.2', q: 'Der ultimative Sportwagen. Teuer im Unterhalt, aber eine Investition in pure Emotion.' }
  }
];

// ── RENDER GRID ───────────────────────────────────────────────
const grid = document.getElementById('carGrid');

carDatabase.forEach(car => {
  const div = document.createElement('div');
  div.className = 'grid-item';
  div.onclick = () => openInfo(car);
  div.innerHTML = `
    <img src="${car.img}" alt="${car.model}">
    <div class="item-info">
      <p>${car.make}</p>
      <h3>${car.model}</h3>
    </div>
  `;
  grid.appendChild(div);
});

// ── MODAL LOGIC ──────────────────────────────────────────────
function openInfo(car) {
  const overlay = document.getElementById('infoOverlay');
  const target = document.getElementById('modalTarget');
  
  target.innerHTML = `
    <div class="modal-inner active-modal">
      <div class="modal-visual">
        <img src="${car.img}" alt="${car.model}">
      </div>
      <div class="modal-content">
        <div class="subhead">${car.make} · ${car.year}</div>
        <h1>${car.model}</h1>
        
        <span class="section-label">Marktanalyse & Technik</span>
        ${car.specs.map(s => `
          <div class="info-row">
            <span>${s.l}</span>
            <span class="val ${s.c}">${s.v}</span>
          </div>
        `).join('')}

        <span class="section-label">Bewertungs-Index</span>
        ${car.scores.map(s => `
          <div class="bar-wrap">
            <div class="bar-label"><span>${s.n}</span><span>${s.v}%</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${s.v}%"></div></div>
          </div>
        `).join('')}

        <div class="verdict-card">
          <div class="v-score">${car.verdict.s}</div>
          <div class="section-label" style="border:none; margin:0 0 10px;">Unser Urteil</div>
          <div class="v-quote">„${car.verdict.q}“</div>
        </div>
      </div>
    </div>
  `;
  
  overlay.style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeInfo() {
  document.getElementById('infoOverlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}
</script>

</body>
</html>
