<title>Fahrzeug-Explorer | Vitra Standard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── VITRA DESIGN SYSTEM ─── */
:root {
  --bg: #ffffff;
  --ink: #000000;
  --ink-soft: #4a4640;
  --ink-light: #8a857e;
  --rule: #f0f0f0;
  --mono: 'DM Mono', monospace;
  --green: #2d6a4f;
  --shadow: 0 40px 80px rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--ink); font-family: 'Lora', serif; line-height: 1.5; }

/* ─── GRID: BORDERLESS & FLOATING ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  padding: 80px 40px;
  gap: 100px 40px; /* Daha fazla nefes alma alanı */
}

.grid-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.grid-item .img-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.grid-item img {
  max-width: 90%;
  height: auto;
  /* GÖRSEL STANDART: Arka plansızmış gibi kontrast ve parlaklık ayarı */
  filter: grayscale(100%) contrast(1.1) brightness(1.05);
  mix-blend-mode: multiply; /* Beyaz arka planla kaynaştırma */
  transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
  transform: translateY(0);
}

.grid-item:hover img {
  filter: grayscale(0%) contrast(1.05) brightness(1);
  transform: translateY(-15px) scale(1.05);
}

.item-label { margin-top: 40px; text-align: center; }
.item-label p { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-light); letter-spacing: 2.5px; }
.item-label h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-top: 8px; letter-spacing: -0.3px; }

/* ─── INFO CARD (POP-UP) ─── */
#modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(20px);
  z-index: 9999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 30px;
}

.modal-content {
  background: white;
  width: 100%;
  max-width: 1240px;
  max-height: 90vh;
  box-shadow: var(--shadow);
  display: grid;
  grid-template-columns: 1.3fr 0.85fr 0.85fr;
  position: relative;
  overflow-y: auto;
}

.close-btn {
  position: absolute;
  top: 40px;
  right: 50px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  cursor: pointer;
  z-index: 10;
}

/* Modal Kolonları */
.col { padding: 80px 60px; }
.col-border { border-left: 1px solid var(--rule); }

/* Sol Kolon: Görsel ve Karar */
.modal-left { display: flex; flex-direction: column; align-items: flex-start; }
.modal-left img { width: 110%; margin-left: -10%; margin-bottom: 60px; mix-blend-mode: multiply; }
.score-row { display: flex; align-items: baseline; gap: 15px; }
.score-num { font-family: 'Playfair Display', serif; font-size: 80px; line-height: 1; letter-spacing: -4px; }
.verdict-text { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 2px; }
.quote-text { font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; line-height: 1.4; margin-top: 40px; color: var(--ink-soft); }

/* Orta Kolon: Teknik Tablo */
.section-head { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-light); letter-spacing: 2px; border-bottom: 1px solid var(--ink); padding-bottom: 10px; margin-bottom: 30px; display: block; }
.tech-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--rule); font-size: 14px; }
.tech-label { color: var(--ink-soft); }
.tech-value { font-family: var(--mono); font-weight: 500; }

/* Sağ Kolon: Grafikler */
.bar-container { margin-bottom: 30px; }
.bar-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; margin-bottom: 10px; }
.bar-bg { height: 1.5px; background: #eee; width: 100%; position: relative; }
.bar-fill { height: 100%; background: var(--ink); width: 0; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

@media (max-width: 1100px) {
  .modal-content { grid-template-columns: 1fr; }
  .col-border { border-left: none; border-top: 1px solid var(--rule); }
}
</style>
</head>
