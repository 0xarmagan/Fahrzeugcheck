<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeugcheck | 40 Modelle Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fdfdfd;
  --ink: #000000;
  --ink3: #8a857e;
  --rule: #eeeeee;
  --mono: 'DM Mono', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--bg); color: var(--ink); font-family: 'Lora', serif; overflow-x: hidden; }

/* ─── HEADER ─── */
.header {
  padding: 60px 40px;
  text-align: center;
  border-bottom: 1px solid var(--rule);
}
.header h1 { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 400; letter-spacing: -1px; }

/* ─── VITRA GRID ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1px;
  background: var(--rule);
}
.grid-item {
  background: white;
  aspect-ratio: 1 / 1.1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 40px;
  transition: background 0.4s ease;
}
.grid-item:hover { background: #f9f9f9; }
.grid-item img {
  max-width: 95%;
  max-height: 55%;
  object-fit: contain;
  filter: grayscale(100%);
  transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}
.grid-item:hover img { filter: grayscale(0%); transform: scale(1.05); }
.item-label { margin-top: 30px; text-align: center; }
.item-label h3 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; }
.item-label p { font-family: var(--mono); font-size: 9px; color: var(--ink3); text-transform: uppercase; margin-top: 5px; }

/* ─── INFO MODAL ─── */
#infoOverlay {
  position: fixed;
  inset: 0;
  background: #fff;
  z-index: 1000;
  display: none;
  overflow-y: auto;
}
.close-btn {
  position: fixed;
  top: 30px;
  right: 30px;
  cursor: pointer;
  font-size: 24px;
  width: 44px;
  height: 44px;
  border: 1px solid var(--rule);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: white;
}
.modal-content { max-width: 700px; margin: 80px auto; text-align: center; padding: 40px 20px; }
.modal-content img { width: 100%; max-width: 500px; margin-bottom: 40px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; text-align: left; margin-top: 40px; border-top: 1px solid var(--rule); padding-top: 40px; }
.stat-box h4 { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink3); margin-bottom: 8px; }
.buy-btn { margin-top: 60px; display: inline-block; padding: 15px 50px; border: 1px solid var(--ink); color: var(--ink); text-decoration: none; font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }
</style>
</head>
<body>

const grid = document.getElementById('mainGrid');

cars.forEach(car => {
  const item = document.createElement('div');
  item.className = 'grid-item';
  item.onclick = () => openInfo(car);
  item.innerHTML = `
    <img src="${car.img}">
    <div class="item-label">
      <p>${car.make}</p>
      <h3>${car.name}</h3>
    </div>
  `;
  grid.appendChild(item);
});

function openInfo(car) {
  document.getElementById('modalBody').innerHTML = `
    <img src="${car.img}">
    <p style="font-family:var(--mono); font-size:11px; color:var(--ink3)">${car.make}</p>
    <h1 style="font-family:'Playfair Display',serif; font-size:36px; margin:10px 0 40px;">${car.name}</h1>
    <div class="stats-grid">
      <div class="stat-box"><h4>Verbrauch / Energie</h4><p>${car.cons}</p></div>
      <div class="stat-box"><h4>Wartungstyp</h4><p>${car.service}</p></div>
      <div class="stat-box" style="grid-column: 1/-1"><h4>Urteil</h4><p>„${car.verdict}“</p></div>
    </div>
    <a href="#" class="buy-btn">Katalog Anfordern</a>
  `;
  document.getElementById('infoOverlay').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closeInfo() {
  document.getElementById('infoOverlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}
