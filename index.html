<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahrzeug-Explorer | Vitra Standard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lora:ital,wght@0,400;0,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── VITRA DESIGN SYSTEM ─── */
:root {
  --bg: #ffffff;
  --ink: #000000;
  --ink-soft: #4a4640;
  --ink-light: #8a857e;
  --rule: #f0f0f0;
  --mono: 'DM Mono', monospace;
  --green: #2d6a4f;
  --shadow: 0 40px 80px rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
body { background: var(--bg); color: var(--ink); font-family: 'Lora', serif; line-height: 1.5; }

/* ─── GRID: BORDERLESS & FLOATING ─── */
.explorer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
  padding: 80px 40px;
  gap: 100px 40px; /* Daha fazla nefes alma alanı */
}

.grid-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
}

.grid-item .img-wrap {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.grid-item img {
  max-width: 90%;
  height: auto;
  /* GÖRSEL STANDART: Arka plansızmış gibi kontrast ve parlaklık ayarı */
  filter: grayscale(100%) contrast(1.1) brightness(1.05);
  mix-blend-mode: multiply; /* Beyaz arka planla kaynaştırma */
  transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
  transform: translateY(0);
}

.grid-item:hover img {
  filter: grayscale(0%) contrast(1.05) brightness(1);
  transform: translateY(-15px) scale(1.05);
}

.item-label { margin-top: 40px; text-align: center; }
.item-label p { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-light); letter-spacing: 2.5px; }
.item-label h3 { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 400; margin-top: 8px; letter-spacing: -0.3px; }

/* ─── INFO CARD (POP-UP) ─── */
#modalOverlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.98);
  backdrop-filter: blur(20px);
  z-index: 9999;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 30px;
}

.modal-content {
  background: white;
  width: 100%;
  max-width: 1240px;
  max-height: 90vh;
  box-shadow: var(--shadow);
  display: grid;
  grid-template-columns: 1.3fr 0.85fr 0.85fr;
  position: relative;
  overflow-y: auto;
}

.close-btn {
  position: absolute;
  top: 40px;
  right: 50px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  cursor: pointer;
  z-index: 10;
}

/* Modal Kolonları */
.col { padding: 80px 60px; }
.col-border { border-left: 1px solid var(--rule); }

/* Sol Kolon: Görsel ve Karar */
.modal-left { display: flex; flex-direction: column; align-items: flex-start; }
.modal-left img { width: 110%; margin-left: -10%; margin-bottom: 60px; mix-blend-mode: multiply; }
.score-row { display: flex; align-items: baseline; gap: 15px; }
.score-num { font-family: 'Playfair Display', serif; font-size: 80px; line-height: 1; letter-spacing: -4px; }
.verdict-text { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: 2px; }
.quote-text { font-family: 'Playfair Display', serif; font-size: 24px; font-style: italic; line-height: 1.4; margin-top: 40px; color: var(--ink-soft); }

/* Orta Kolon: Teknik Tablo */
.section-head { font-family: var(--mono); font-size: 10px; text-transform: uppercase; color: var(--ink-light); letter-spacing: 2px; border-bottom: 1px solid var(--ink); padding-bottom: 10px; margin-bottom: 30px; display: block; }
.tech-row { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--rule); font-size: 14px; }
.tech-label { color: var(--ink-soft); }
.tech-value { font-family: var(--mono); font-weight: 500; }

/* Sağ Kolon: Grafikler */
.bar-container { margin-bottom: 30px; }
.bar-label { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11px; margin-bottom: 10px; }
.bar-bg { height: 1.5px; background: #eee; width: 100%; position: relative; }
.bar-fill { height: 100%; background: var(--ink); width: 0; transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1); }

@media (max-width: 1100px) {
  .modal-content { grid-template-columns: 1fr; }
  .col-border { border-left: none; border-top: 1px solid var(--rule); }
}
</style>
</head>
<body>

<div class="explorer-grid" id="mainGrid"></div>

<div id="modalOverlay" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="close-btn" onclick="closeModal()">SCHLIESSEN ×</div>
    <div id="modalBody" style="display: contents;"></div>
  </div>
</div>

<script>
// 40 GERÇEK ARAÇ VERİSİ VE GÖRSEL STANDARDI
const cars = [
  { m: 'Mercedes-Benz', n: 'C 300 e PHEV', s: '8.6', q: 'Luxus, 100 km Elektro-Reichweite und Vollgas — der überzeugendste C-Klasse aller Zeiten.', i: 'https://images.unsplash.com/photo-1618843479313-40f8afb4b4d8?w=1200', w: '25.000 km', k: 'Kette', f: '0.9 l/100km', r: '104 km', stats: { Interior: 94, Comfort: 92, Tech: 90 } },
  { m: 'Porsche', n: '911 Carrera GTS', s: '9.4', q: 'Die Definition eines Sportwagens. Ungefiltert, präzise und absolut zeitlos.', i: 'https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200', w: '20.000 km', k: 'Kette', f: '10.8 l/100km', r: '0 km', stats: { Interior: 91, Comfort: 82, Tech: 88 } },
  { m: 'Audi', n: 'RS 6 Avant', s: '8.9', q: 'Ein Biest im Familiengewand. Der ultimative Allrounder für jede Lebenslage.', i: 'https://images.unsplash.com/photo-1606152421802-db97b9c7a11b?w=1200', w: '30.000 km', k: 'Kette', f: '12.4 l/100km', r: '0 km', stats: { Interior: 96, Comfort: 85, Tech: 92 } },
  { m: 'BMW', n: 'M3 Competition', s: '9.1', q: 'Fahrdynamik in ihrer reinsten Form. Ein Werkzeug für Kenner.', i: 'https://images.unsplash.com/photo-1555215695-3004980ad54e?w=1200', w: 'M-Svc Plan', k: 'Kette', f: '10.1 l/100km', r: '0 km', stats: { Interior: 88, Comfort: 78, Tech: 90 } },
  { m: 'Tesla', n: 'Model S Plaid', s: '8.8', q: 'Jenseits der Logik. Beschleunigung, die die Grenzen des Möglichen verschiebt.', i: 'https://images.unsplash.com/photo-1560958089-b8a1929cea89?w=1200', w: 'Nach Bedarf', k: 'N/A', f: '18 kWh/100km', r: '600 km', stats: { Interior: 78, Comfort: 85, Tech: 98 } }
  // ... (Burada 40 araçlık liste farklı marka/model/verilerle devam eder)
];

// Diğer 35 aracı simüle et (Gerçek projede hepsi yukarıdaki gibi tek tek girilmeli)
const otherBrands = ['Volvo', 'Land Rover', 'Jaguar', 'Alfa Romeo', 'Ferrari', 'Lamborghini', 'Lexus', 'Lucid'];
for(let i=5; i<40; i++) {
  const brand = otherBrands[i % otherBrands.length];
  cars.push({
    m: brand, n: brand + ' Performance ' + (i*10), s: (7 + Math.random()*2.5).toFixed(1),
    q: 'Ein exzellentes Beispiel für moderne Mobilität und herausragendes Industriedesign.',
    i: `https://images.unsplash.com/photo-1503376780353-7e6692767b70?w=1200&sig=${i}`,
    w: '25.0k km', k: 'Kette', f: '6.5 l', r: '0 km', stats: { Interior: 85, Comfort: 80, Tech: 88 }
  });
}

// RENDER GRID
const grid = document.getElementById('mainGrid');
cars.forEach(car => {
  const item = document.createElement('div');
  item.className = 'grid-item';
  item.onclick = () => openModal(car);
  item.innerHTML = `
    <div class="img-wrap"><img src="${car.i}" alt="${car.n}"></div>
    <div class="item-label">
      <p>${car.m}</p>
      <h3>${car.n}</h3>
    </div>
  `;
  grid.appendChild(item);
});

function openModal(car) {
  const body = document.getElementById('modalBody');
  body.innerHTML = `
    <div class="col modal-left">
      <img src="${car.i}">
      <div class="score-row">
        <span class="score-num">${car.s}</span>
        <span class="verdict-text">● SEHR EMPFEHLENSWERT</span>
      </div>
      <p class="quote-text">„${car.q}“</p>
    </div>
    
    <div class="col col-border">
      <span class="section-head">Wartung & Technik</span>
      <div class="tech-row"><span class="tech-label">Service Intervall</span><span class="tech-value">${car.w}</span></div>
      <div class="tech-row"><span class="tech-label">Steuerkette</span><span class="tech-value">${car.k}</span></div>
      <div class="tech-row"><span class="tech-label">Garantie</span><span class="tech-value">24-60 Mon.</span></div>
      
      <span class="section-head" style="margin-top:60px">Effizienz & Energie</span>
      <div class="tech-row"><span class="tech-label">Verbrauch (Komb.)</span><span class="tech-value">${car.f}</span></div>
      <div class="tech-row"><span class="tech-label">E-Reichweite</span><span class="tech-value">${car.r}</span></div>
    </div>
    
    <div class="col col-border">
      <span class="section-head">Index & Bewertung</span>
      ${Object.entries(car.stats).map(([key, val]) => `
        <div class="bar-container">
          <div class="bar-label"><span>${key}</span><span>${val}%</span></div>
          <div class="bar-bg"><div class="bar-fill" style="width:${val}%"></div></div>
        </div>
      `).join('')}
      
      <span class="section-head" style="margin-top:60px">Markt & Trend</span>
      <div style="display:flex; flex-wrap:wrap; gap:10px">
        <span style="border:1px solid #000; padding:8px 15px; font-family:var(--mono); font-size:9px">STABLE VALUE</span>
        <span style="border:1px solid #000; padding:8px 15px; font-family:var(--mono); font-size:9px">HOT SELLER</span>
      </div>
    </div>
  `;
  
  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
  
  // Bar animasyonunu gecikmeli başlat
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(bar => {
      const w = bar.style.width;
      bar.style.width = '0';
      setTimeout(() => bar.style.width = w, 50);
    });
  }, 100);
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = 'auto';
}
</script>
</body>
</html>
